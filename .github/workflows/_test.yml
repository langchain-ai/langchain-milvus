name: test

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
        description: "From which folder this pipeline executes"
    secrets:
      OPENAI_API_KEY:
        required: false
        description: "OpenAI API key for Milvus embedding function tests"
      TEST_SECRET:
        required: false
        description: "Temporary test secret for debugging"

env:
  POETRY_VERSION: "2.1.3"

jobs:
  build:
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.12"
    name: "make test #${{ matrix.python-version }}"
    steps:
      - name: Debug - Check secrets at job start
        run: |
          echo "=== Debugging secrets availability ==="
          echo "TEST_SECRET exists: ${{ secrets.TEST_SECRET != '' }}"
          echo "OPENAI_API_KEY exists: ${{ secrets.OPENAI_API_KEY != '' }}"
          if [ -n "${{ secrets.TEST_SECRET }}" ]; then
            echo "TEST_SECRET length: ${#TEST_SECRET}"
          else
            echo "TEST_SECRET is empty"
          fi
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY is set"
          else
            echo "OPENAI_API_KEY is empty"
          fi
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} + Poetry ${{ env.POETRY_VERSION }}
        uses: "./.github/actions/poetry_setup"
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ env.POETRY_VERSION }}
          working-directory: ${{ inputs.working-directory }}
          cache-key: core

      - name: Install dependencies
        shell: bash
        run: poetry install --with test

      - name: Run unit tests
        shell: bash
        run: |
          make test

      - name: Create temporary directory for Milvus
        run: |
          mkdir -p milvus_temp
          cd milvus_temp
          wget https://raw.githubusercontent.com/milvus-io/milvus/master/scripts/standalone_embed.sh
          cd ..

      - name: Run Milvus
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          cd milvus_temp
          
          echo "=== Before running Python script ==="
          echo "TEST_SECRET from env: ${TEST_SECRET:-empty}"
          echo "OPENAI_API_KEY from env: ${OPENAI_API_KEY:-empty}"
          
          # Setup Milvus with OpenAI credentials and patch the script
          python3 $GITHUB_WORKSPACE/.github/scripts/patch_milvus_script.py standalone_embed.sh
          
          bash standalone_embed.sh start
          cd ..
          sleep 5
          echo "\nMilvus server started with OpenAI API key configured!"

      - name: Run integration tests
        shell: bash
        run: |
          make integration_test

      - name: Stop and Remove Milvus
        run: |
          cd milvus_temp
          bash standalone_embed.sh stop
          cd ..
          sudo rm -rf milvus_temp
          echo "\nMilvus server stopped and removed!"

      - name: Ensure the tests did not create any additional files
        shell: bash
        run: |
          set -eu

          STATUS="$(git status)"
          echo "$STATUS"

          # grep will exit non-zero if the target message isn't found,
          # and `set -e` above will cause the step to fail.
          echo "$STATUS" | grep 'nothing to commit, working tree clean'
